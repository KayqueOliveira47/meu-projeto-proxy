<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conector MeuPluggy</title>
    <!-- Script Oficial Atualizado da Pluggy Connect -->
    <script src="https://cdn.pluggy.ai/pluggy-connect/v2/index.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f5f7;
            margin: 0;
        }
        .btn-conectar {
            background-color: #0057FF;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background 0.2s;
        }
        .btn-conectar:hover {
            background-color: #0042C2;
        }
        #status {
            margin-top: 20px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Integração Open Finance</h1>
    <p>Clique no botão abaixo para conectar sua conta do MeuPluggy.</p>
    <button class="btn-conectar" onclick="abrirWidgetPluggy()">Conectar Conta Bancária</button>
    <div id="status"></div>

    <script>
        async function abrirWidgetPluggy() {
            // Dentro da sua função abrirWidgetPluggy() no index.html:
            const response = await fetch('/api/proxy', { method: 'POST' });
            const data = await response.json();
            
            if (!data.accessToken) {
                throw new Error("Token não encontrado.");
            }
            
            // Inicializa o Widget visual sem sair da página
            const pluggyConnect = new window.PluggyConnect({
                connectToken: data.accessToken,
                connectorId: 4, // ID do conector MeuPluggy
                onSuccess: (itemData) => {
                    console.log('Sucesso! Conta conectada:', itemData);
                    document.getElementById('status').innerHTML = `<b style="color: green;">Sucesso!</b> ID da Conexão: ${itemData.item.id}`;
                },
                onError: (error) => {
                    console.error('Erro no widget:', error);
                }
            });
            
            pluggyConnect.init();

            } catch (error) {
                console.error('Erro ao iniciar o processo:', error);
                statusDiv.innerHTML = `<b style="color: red;">Erro:</b> ${error.message}`;
            }
        }
    </script>
</body>
</html>
